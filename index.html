<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Networks</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <div class="glass-card">
            <img src="img/logo.gif" alt="Freedom Networks Logo" class="logo">
            
            <h1 class="title">freedom networks</h1>
            <p id="splash" class="splash-text"></p>
            
            <form id="uv-form">
                <input id="uv-address" type="text" placeholder="Search the web freely..." class="search-bar">
            </form>

            <div class="controls">
                <button onclick="tabCloak()" class="btn-secondary">Enable Tab Cloak</button>
            </div>
        </div>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script src="js/search.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
