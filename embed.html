<!DOCTYPE html>
<html>
<head>
    <title>Freedom Networks - Viewing</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <iframe id="uv-iframe" style="width:100%; height:100vh;"></iframe>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const encodedUrl = sessionStorage.getItem("encodedUrl");
        const iframe = document.getElementById("uv-iframe");
        
        if (encodedUrl) {
            // This tells Ultraviolet to load the site
            iframe.src = __uv$config.prefix + encodedUrl;
        } else {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
